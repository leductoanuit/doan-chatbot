version: '3.8'

# Local development services
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres-dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_dev
    restart: unless-stopped

  # Legacy — keep for llama-index if needed
  mongodb:
    image: mongodb/mongodb-community-server:7.0-ubuntu2204
    container_name: chatbot-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGODB_INITDB_DATABASE=chatbot
    restart: unless-stopped
    profiles:
      - legacy

volumes:
  qdrant_data:
  postgres_data:
  mongodb_data:
